name: Create Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_PHP: webticari-yazilim/webticari-mvc-local-php
  IMAGE_NAME_NGINX: webticari-yazilim/webticari-mvc-local-nginx
  IMAGE_NAME_WS: webticari-yazilim/webticari-mvc-local-ws

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-installer:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Init submodule (src)
        shell: bash
        run: |
        with:
          name: installer
          path: out/WebticariMvcLocalInstaller.zip
          retention-days: 1

  build-php:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Clone MVC submodule
        shell: bash
        run: |
          git submodule sync --recursive
          git -c url."https://x-access-token:${{ secrets.GH_PAT }}@github.com/".insteadOf="git@github.com:" \
            -c url."https://x-access-token:${{ secrets.GH_PAT }}@github.com/".insteadOf="https://github.com/" \
            submodule update --init --recursive --depth=1
      - uses: docker/setup-buildx-action@v3
      - name: Docker login to GHCR
        shell: bash
        run: |
          echo "${{ secrets.GH_PAT }}" | docker login ghcr.io -u ignored --password-stdin
      - uses: docker/metadata-action@v5
        id: meta-php
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PHP }}
          tags: |
            type=raw,value=${{ github.ref_name }}
            type=raw,value=latest
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.php
          push: true
          tags: ${{ steps.meta-php.outputs.tags }}
          labels: ${{ steps.meta-php.outputs.labels }}
          build-args: APP_ENV=production

  build-nginx:
    runs-on: ubuntu-latest
    needs: build-php
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Docker login to GHCR
        shell: bash
        run: |
          echo "${{ secrets.GH_PAT }}" | docker login ghcr.io -u ignored --password-stdin
      - uses: docker/metadata-action@v5
        id: meta-nginx
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_NGINX }}
          tags: |
            type=raw,value=${{ github.ref_name }}
            type=raw,value=latest
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.nginx
          push: true
          tags: ${{ steps.meta-nginx.outputs.tags }}
          labels: ${{ steps.meta-nginx.outputs.labels }}

  build-websocket:
    runs-on: ubuntu-latest
    needs: build-php
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Docker login to GHCR
        shell: bash
        run: |
          echo "${{ secrets.GH_PAT }}" | docker login ghcr.io -u ignored --password-stdin
      - uses: docker/metadata-action@v5
        id: meta-ws
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_WS }}
          tags: |
            type=raw,value=${{ github.ref_name }}
            type=raw,value=latest
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.websocket
          push: true
          tags: ${{ steps.meta-ws.outputs.tags }}
          labels: ${{ steps.meta-ws.outputs.labels }}
          build-args: |
            BASE_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PHP }}:${{ github.ref_name }}

  release:
    runs-on: ubuntu-latest
    needs: [build-installer, build-php, build-nginx, build-websocket]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          name: installer
      - uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          make_latest: true
          files: WebticariMvcLocalInstaller.zip
