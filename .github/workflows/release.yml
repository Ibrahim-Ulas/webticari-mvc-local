name: Create Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-installer:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Init submodule (src)
        run: |
          git submodule sync --recursive
          git -c url."https://x-access-token:${{ secrets.GH_PAT }}@github.com/".insteadOf="git@github.com:" \
            -c url."https://x-access-token:${{ secrets.GH_PAT }}@github.com/".insteadOf="https://github.com/" \
            submodule update --init --recursive --depth=1 src
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Restore dependencies
        run: dotnet restore src/WebticariBootstrapper/WebticariBootstrapper.csproj
      - name: Build installer
        run: dotnet publish src/WebticariBootstrapper/WebticariBootstrapper.csproj -c Release -r win-x64 --self-contained true -o out/installer/
      - name: Package installer
        run: Compress-Archive -Path out/installer/* -DestinationPath out/WebticariMvcLocalInstaller.zip
      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer
          path: out/WebticariMvcLocalInstaller.zip
          retention-days: 1

  release:
    runs-on: ubuntu-latest
    needs: build-installer
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Clone MVC submodule
        run: |
          git submodule sync --recursive
          git -c url."https://x-access-token:${{ secrets.GH_PAT }}@github.com/".insteadOf="git@github.com:" \
            -c url."https://x-access-token:${{ secrets.GH_PAT }}@github.com/".insteadOf="https://github.com/" \
            submodule update --init --recursive --depth=1
      - name: Download installer artifact
        uses: actions/download-artifact@v4
        with:
          name: installer
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          make_latest: true
          files: WebticariMvcLocalInstaller.zip

  build-and-push:
    needs: release
    uses: ./.github/workflows/build-docker.yml
    with:
      image_tag: ${{ github.ref_name }}
    secrets: inherit
